name: "bluebell"
mode: "release"
port: 8084
version: "v1.0.0"
start_time: "2026-01-01"
machine_id: 2

auth:
  jwt_expire: 8

log:
  level: "info"
  filename: "logs/web_app.log"
  max_size: 200
  max_age: 30
  max_backups: 7

# 注意：host 使用 Docker Compose 服务名，不是 127.0.0.1
# bridge 网络中各容器通过服务名互相寻址
mysql:
  host: "mysql"
  port: 3306
  user: "root"
  password: "123456"
  dbname: "bluebell"
  max_open_conns: 200
  max_idle_conns: 50

redis:
  host: "redis"
  port: 6379
  password: "123456"
  db: 6
  pool_size: 100
