# 应用层部署（方案 B：MySQL / Redis 单独常驻，此文件只管 backend + frontend）
#
# 前提条件（服务器上已运行）：
#   mysql8  容器监听 127.0.0.1:3306
#   redis   容器监听 127.0.0.1:6379
#   数据库表已初始化（首次部署前手动执行一次 sql/init.sql，见下方说明）
#
# ─────────────────────────────────────────────────────────────
#  首次部署前（只做一次）：初始化数据库表
#    docker exec -i mysql8 mysql -uroot -p123456 bluebell < sql/init.sql
#
#  部署 / 更新应用
#    docker-compose -f docker-compose.cloud.yml up -d --build
#
#  只更新后端（前端不重建）
#    docker-compose -f docker-compose.cloud.yml up -d --build backend
#
#  查看日志
#    docker-compose -f docker-compose.cloud.yml logs -f backend
# ─────────────────────────────────────────────────────────────

version: "2.4"

services:

  # ── Backend ────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: bluebell-backend:cloud
    container_name: bluebell-cloud-backend
    network_mode: host           # 直接使用宿主机网络，可访问 127.0.0.1:3306 / 6379
    restart: unless-stopped
    volumes:
      - ./backend/conf/cloud.yaml:/app/conf/cloud.yaml:ro
      - ./uploads:/app/uploads
      - ./logs/backend:/app/logs
    command: ["./bluebell", "conf/cloud.yaml"]

  # ── Frontend (Nginx) ───────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: bluebell-frontend:cloud
    container_name: bluebell-cloud-frontend
    network_mode: host           # 监听宿主机 :80，代理到宿主机 127.0.0.1:8084
    restart: unless-stopped
    volumes:
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - backend
