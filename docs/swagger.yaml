host: 127.0.0.1:8084
info:
  contact: {}
  title: bluebell项目接口文档
  version: "1.0"
paths:
  /api/v1/admin/articles:
    get:
      consumes:
      - application/json
      description: 管理员获取所有文章列表，支持状态筛选
      parameters:
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 20
        description: 每页数量
        in: query
        name: size
        type: integer
      - description: 文章状态
        enum:
        - all
        - published
        - draft
        - offline
        in: query
        name: status
        type: string
      - description: 作者用户名
        in: query
        name: author
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 文章列表
          schema:
            $ref: '#/definitions/controller._ResponseArticleList'
        "401":
          description: 未登录
          schema:
            $ref: '#/definitions/controller._ResponseError'
        "403":
          description: 无权限
          schema:
            $ref: '#/definitions/controller._ResponseError'
        "500":
          description: 服务器错误
          schema:
            $ref: '#/definitions/controller._ResponseError'
      security:
      - ApiKeyAuth: []
      summary: 管理员获取文章列表
      tags:
      - 管理员
  /api/v1/admin/articles/{id}/featured:
    patch:
      consumes:
      - application/json
      description: 管理员设置文章的精选状态
      parameters:
      - description: 文章ID
        in: path
        name: id
        required: true
        type: integer
      - description: 精选状态
        in: body
        name: featured
        required: true
        schema:
          $ref: '#/definitions/models.ParamArticleFeatured'
      produces:
      - application/json
      responses:
        "200":
          description: 设置成功
          schema:
            $ref: '#/definitions/controller._ResponseSuccess'
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/controller._ResponseError'
        "401":
          description: 未登录
          schema:
            $ref: '#/definitions/controller._ResponseError'
        "403":
          description: 无权限
          schema:
            $ref: '#/definitions/controller._ResponseError'
        "500":
          description: 服务器错误
          schema:
            $ref: '#/definitions/controller._ResponseError'
      security:
      - ApiKeyAuth: []
      summary: 管理员设置文章精选
      tags:
      - 管理员
  /api/v1/admin/metrics/history:
    get:
      consumes:
      - application/json
      description: 获取指定时间段内的系统性能历史数据
      parameters:
      - description: 开始时间戳（秒）
        in: query
        name: start_time
        type: integer
      - description: 结束时间戳（秒）
        in: query
        name: end_time
        type: integer
      - default: cpu
        description: 指标类型
        enum:
        - cpu
        - memory
        - disk
        in: query
        name: metric_type
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 历史数据
          schema:
            $ref: '#/definitions/controller._ResponseMetricsHistory'
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/controller._ResponseError'
        "401":
          description: 未登录
          schema:
            $ref: '#/definitions/controller._ResponseError'
        "403":
          description: 无权限
          schema:
            $ref: '#/definitions/controller._ResponseError'
        "500":
          description: 服务器错误
          schema:
            $ref: '#/definitions/controller._ResponseError'
      security:
      - ApiKeyAuth: []
      summary: 获取系统性能历史数据
      tags:
      - 管理员
  /api/v1/admin/metrics/realtime:
    get:
      consumes:
      - application/json
      description: 获取系统实时性能指标（CPU、内存、磁盘、活跃用户数）
      produces:
      - application/json
      responses:
        "200":
          description: 系统性能指标
          schema:
            $ref: '#/definitions/models.SystemMetrics'
        "401":
          description: 未登录
          schema:
            $ref: '#/definitions/controller._ResponseError'
        "403":
          description: 无权限
          schema:
            $ref: '#/definitions/controller._ResponseError'
        "500":
          description: 服务器错误
          schema:
            $ref: '#/definitions/controller._ResponseError'
      security:
      - ApiKeyAuth: []
      summary: 获取系统性能指标
      tags:
      - 管理员
  /api/v1/admin/stats/daily:
    get:
      consumes:
      - application/json
      description: 获取系统每日统计数据（用户、文章、评论新增数量）
      parameters:
      - description: 开始日期（YYYY-MM-DD）
        in: query
        name: start_date
        type: string
      - description: 结束日期（YYYY-MM-DD）
        in: query
        name: end_date
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 日统计数据
          schema:
            $ref: '#/definitions/models.DailyStats'
        "401":
          description: 未登录
          schema:
            $ref: '#/definitions/controller._ResponseError'
        "403":
          description: 无权限
          schema:
            $ref: '#/definitions/controller._ResponseError'
        "500":
          description: 服务器错误
          schema:
            $ref: '#/definitions/controller._ResponseError'
      security:
      - ApiKeyAuth: []
      summary: 获取系统日统计
      tags:
      - 管理员
  /api/v1/admin/stats/overview:
    get:
      consumes:
      - application/json
      description: 获取系统概览统计数据（用户、文章、评论总数等）
      produces:
      - application/json
      responses:
        "200":
          description: 系统概览数据
          schema:
            $ref: '#/definitions/models.SystemOverview'
        "401":
          description: 未登录
          schema:
            $ref: '#/definitions/controller._ResponseError'
        "403":
          description: 无权限
          schema:
            $ref: '#/definitions/controller._ResponseError'
        "500":
          description: 服务器错误
          schema:
            $ref: '#/definitions/controller._ResponseError'
      security:
      - ApiKeyAuth: []
      summary: 获取系统概览
      tags:
      - 管理员
  /api/v1/admin/users:
    get:
      consumes:
      - application/json
      description: 管理员获取用户列表，支持角色和状态筛选
      parameters:
      - default: all
        description: 用户角色
        enum:
        - all
        - visitor
        - reader
        - author
        - admin
        in: query
        name: role
        type: string
      - default: all
        description: 用户状态
        enum:
        - all
        - active
        - inactive
        in: query
        name: status
        type: string
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 20
        description: 每页数量
        in: query
        name: size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 用户列表
          schema:
            $ref: '#/definitions/controller._ResponseUserList'
        "401":
          description: 未登录
          schema:
            $ref: '#/definitions/controller._ResponseError'
        "403":
          description: 无权限
          schema:
            $ref: '#/definitions/controller._ResponseError'
        "500":
          description: 服务器错误
          schema:
            $ref: '#/definitions/controller._ResponseError'
      security:
      - ApiKeyAuth: []
      summary: 获取用户列表
      tags:
      - 管理员
  /api/v1/admin/users/{id}:
    get:
      consumes:
      - application/json
      description: 管理员获取用户详细信息
      parameters:
      - description: 用户ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 用户详情
          schema:
            $ref: '#/definitions/controller._ResponseUserDetail'
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/controller._ResponseError'
        "401":
          description: 未登录
          schema:
            $ref: '#/definitions/controller._ResponseError'
        "403":
          description: 无权限
          schema:
            $ref: '#/definitions/controller._ResponseError'
        "500":
          description: 服务器错误
          schema:
            $ref: '#/definitions/controller._ResponseError'
      security:
      - ApiKeyAuth: []
      summary: 获取用户详情
      tags:
      - 管理员
  /api/v1/admin/users/{id}/role:
    patch:
      consumes:
      - application/json
      description: 管理员更新用户角色（admin/author/reader）
      parameters:
      - description: 用户ID
        in: path
        name: id
        required: true
        type: integer
      - description: 角色信息
        in: body
        name: role
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: 更新成功
          schema:
            $ref: '#/definitions/controller._ResponseSuccess'
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/controller._ResponseError'
        "401":
          description: 未登录
          schema:
            $ref: '#/definitions/controller._ResponseError'
        "403":
          description: 无权限
          schema:
            $ref: '#/definitions/controller._ResponseError'
        "500":
          description: 服务器错误
          schema:
            $ref: '#/definitions/controller._ResponseError'
